<tr class="border-t hover:bg-gray-50">
    <td class="px-6 py-3">{{ c.created_at[:10] if c.created_at is string else c.created_at.strftime('%Y-%m-%d') }}</td>
    <td class="px-6 py-3">
        <span class="px-2 py-1 rounded text-xs
            {% if c.contribution_type == 'regular' %}bg-blue-100 text-blue-700
            {% elif c.contribution_type == 'extraordinary' %}bg-purple-100 text-purple-700
            {% else %}bg-gray-100 text-gray-700{% endif %}">
            {{ c.contribution_type }}
        </span>
    </td>
    <td class="px-6 py-3">{{ c.period_year }}-{{ "%02d"|format(c.period_month) }}</td>
    <td class="px-6 py-3 text-gray-600">{{ c.description or '-' }}</td>
    <td class="px-6 py-3 text-right font-semibold text-green-600">${{ "%.2f"|format(c.amount) }}</td>
    {% if is_admin is defined and is_admin %}
    <td class="px-6 py-3">
        <button hx-delete="/api/contributions/{{ c.id }}"
                hx-confirm="Cancel this contribution?"
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="text-red-500 hover:text-red-700 text-xs">
            Cancel
        </button>
    </td>
    {% endif %}
</tr>

{% extends "base.html" %}
{% block title %}New Contribution - FONAFAHE{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/contributions" class="text-indigo-600 hover:underline text-sm">&larr; Back to contributions</a>
    <h1 class="text-2xl font-bold text-gray-800 mt-2">Record New Contribution</h1>
</div>

<div class="bg-white rounded-xl shadow p-6 max-w-lg">
    <form hx-post="/api/contributions/htmx" hx-target="#result" hx-swap="innerHTML">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Account</label>
                <select name="account_id" required class="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="">Select account...</option>
                    {% for a in accounts %}
                    <option value="{{ a.id }}">{{ a.account_number }} (Balance: ${{ "%.2f"|format(a.balance) }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
                <input type="number" name="amount" step="0.01" min="0.01" required
                    class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="0.00">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                <select name="contribution_type" class="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="regular">Regular</option>
                    <option value="extraordinary">Extraordinary</option>
                    <option value="initial">Initial</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
                    <input type="number" name="period_year" value="2026" required
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Month</label>
                    <input type="number" name="period_month" min="1" max="12" required
                        class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="1-12">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <input type="text" name="description" class="w-full border rounded-lg px-3 py-2 text-sm"
                    placeholder="Monthly contribution">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Receipt Reference</label>
                <input type="text" name="receipt_reference" class="w-full border rounded-lg px-3 py-2 text-sm"
                    placeholder="Optional">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
                Record Contribution
            </button>
        </div>
    </form>

    <div id="result" class="mt-4"></div>
</div>
{% endblock %}

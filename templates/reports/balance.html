{% extends "base.html" %}
{% block title %}Balance Reports - FONAFAHE{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Balance Reports</h1>

<div class="bg-white rounded-xl shadow p-6 mb-6">
    <form id="report-form" class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Account</label>
            <select id="account_id" class="border rounded px-3 py-2 text-sm">
                {% for a in accounts %}
                <option value="{{ a.id }}">{{ a.account_number }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Type</label>
            <select id="snapshot_type" class="border rounded px-3 py-2 text-sm">
                <option value="daily">Daily</option>
                <option value="monthly" selected>Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">From</label>
            <input type="date" id="date_from" class="border rounded px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">To</label>
            <input type="date" id="date_to" class="border rounded px-3 py-2 text-sm">
        </div>
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm hover:bg-indigo-700">Load</button>
    </form>
</div>

<div id="report-data" class="bg-white rounded-xl shadow overflow-hidden">
    <p class="px-6 py-8 text-center text-gray-400">Select filters and click Load to view report</p>
</div>

<script>
    document.getElementById('report-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const params = new URLSearchParams({
            account_id: document.getElementById('account_id').value,
            snapshot_type: document.getElementById('snapshot_type').value,
        });
        const from = document.getElementById('date_from').value;
        const to = document.getElementById('date_to').value;
        if (from) params.set('date_from', from);
        if (to) params.set('date_to', to);

        const res = await fetch('/api/reports/balance?' + params);
        const container = document.getElementById('report-data');

        if (!res.ok) {
            container.innerHTML = '<p class="px-6 py-8 text-center text-red-500">Error loading report</p>';
            return;
        }

        const data = await res.json();
        if (!data.length) {
            container.innerHTML = '<p class="px-6 py-8 text-center text-gray-400">No snapshots found for this period</p>';
            return;
        }

        let html = '<table class="w-full text-sm"><thead class="bg-gray-50"><tr class="text-left text-gray-500">';
        html += '<th class="px-6 py-3">Date</th><th class="px-6 py-3">Balance</th>';
        html += '<th class="px-6 py-3">Contributions</th><th class="px-6 py-3">Loan Disbursements</th>';
        html += '<th class="px-6 py-3">Loan Payments</th></tr></thead><tbody>';

        data.forEach(s => {
            html += '<tr class="border-t">';
            html += '<td class="px-6 py-3">' + s.snapshot_date + '</td>';
            html += '<td class="px-6 py-3 font-semibold text-indigo-700">$' + s.balance.toFixed(2) + '</td>';
            html += '<td class="px-6 py-3 text-green-600">$' + s.total_contributions.toFixed(2) + '</td>';
            html += '<td class="px-6 py-3 text-orange-600">$' + s.total_loan_disbursements.toFixed(2) + '</td>';
            html += '<td class="px-6 py-3 text-blue-600">$' + s.total_loan_payments.toFixed(2) + '</td>';
            html += '</tr>';
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    });
</script>
{% endblock %}
